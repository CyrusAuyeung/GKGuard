name: Feature request / 功能建议
description: Suggest a scoped improvement for GKGuard / 提出清晰范围的功能建议
title: "[Feature]: "
labels: ["type: feature"]
body:
  - type: dropdown
    id: area
    attributes:
      label: Area / 模块
      options:
        - GKGuard C2 search workflow / GKGuard C2 检索流程
        - CampusVision C1 service integration / CampusVision C1 服务接入
        - Desktop startup or installer / 桌面启动或安装包
        - CampusCar or UE integration / CampusCar 或 UE 集成
        - Documentation or maintenance / 文档或维护
        - Release process / 发布流程
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem / 问题背景
      description: What user or maintenance problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution / 建议方案
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives / 替代方案
  - type: checkboxes
    id: boundary
    attributes:
      label: Boundary check / 边界检查
      options:
        - label: This does not require committing real media or private data. / 不需要提交真实媒体或隐私数据。
        - label: If it touches CampusVision C1/CampusCar/UE, the external service boundary is described. / 如涉及 CampusVision C1/CampusCar/UE，已说明外部服务边界。
        - label: If it affects releases, docs and release notes will be updated. / 如影响发布，会同步文档和发布说明。
