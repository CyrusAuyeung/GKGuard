name: Build Desktop Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build-desktop:
    name: Build ${{ matrix.name }} Desktop App
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            platform: windows
            os: windows-latest
            dist_script: dist:win
            artifact_name: GKGuard-Windows
          - name: macOS
            platform: macos
            os: macos-15-intel
            dist_script: dist:mac
            artifact_name: GKGuard-macOS
          - name: Linux
            platform: linux
            os: ubuntu-latest
            dist_script: dist:linux
            artifact_name: GKGuard-Linux

    env:
      CSC_IDENTITY_AUTO_DISCOVERY: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.13"

      - name: Install backend dependencies
        run: python -m pip install -r backend/requirements.txt

      - name: Set up Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: "22"
          cache: npm

      - name: Install desktop dependencies
        run: npm ci

      - name: Install Playwright browser
        if: matrix.platform != 'linux'
        run: npx playwright install chromium

      - name: Install Playwright browser and Linux dependencies
        if: matrix.platform == 'linux'
        run: npx playwright install --with-deps chromium

      - name: Run backend tests
        run: npm run test:backend

      - name: Check frontend and desktop syntax
        run: |
          node --check backend/app/static/app.js
          node --check desktop/main.js
          node --check desktop/preload.js

      - name: Run browser E2E tests
        run: npm run test:e2e

      - name: Build bundled backend on Windows
        if: matrix.platform == 'windows'
        shell: pwsh
        run: pyinstaller --noconfirm --onedir --name gkguard-backend --distpath backend-dist --workpath backend-build --paths backend --add-data "backend/app/static;app/static" --add-data "backend/data;data" backend/desktop_server.py

      - name: Build bundled backend on macOS and Linux
        if: matrix.platform != 'windows'
        shell: bash
        run: pyinstaller --noconfirm --onedir --name gkguard-backend --distpath backend-dist --workpath backend-build --paths backend --add-data "backend/app/static:app/static" --add-data "backend/data:data" backend/desktop_server.py

      - name: Build platform desktop package
        shell: pwsh
        env:
          DIST_SCRIPT: ${{ matrix.dist_script }}
        run: |
          $maxAttempts = 3
          for ($attempt = 1; $attempt -le $maxAttempts; $attempt++) {
            Write-Host "Running npm run $env:DIST_SCRIPT (attempt $attempt of $maxAttempts)"
            npm run $env:DIST_SCRIPT
            $exitCode = $LASTEXITCODE
            if ($exitCode -eq 0) {
              exit 0
            }

            if ($attempt -eq $maxAttempts) {
              Write-Error "Desktop package build failed after $maxAttempts attempts."
              exit $exitCode
            }

            $delaySeconds = 20 * $attempt
            Write-Warning "Desktop package build failed with exit code $exitCode. Retrying in $delaySeconds seconds."
            Start-Sleep -Seconds $delaySeconds
          }

      - name: Upload workflow artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            release/*.exe
            release/*.dmg
            release/*.zip
            release/*.AppImage
            release/*.deb
            release/*.blockmap
            release/latest*.yml
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/')
    needs: build-desktop
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Download desktop artifacts
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6
        with:
          path: release-assets
          merge-multiple: true

      - name: Generate release notes
        shell: pwsh
        run: |
          $tag = $env:GITHUB_REF_NAME
          $curatedNotes = "docs/releases/$tag.md"
          if (Test-Path $curatedNotes) {
            Copy-Item $curatedNotes release-notes.md
            exit 0
          }

          $previousTag = git tag --sort=-version:refname | Where-Object { $_ -ne $tag } | Select-Object -First 1
          if ($previousTag) {
            $range = "$previousTag..$tag"
            $compareTextZh = "相较 $previousTag 的变更"
            $compareTextEn = "Changes since $previousTag"
          } else {
            $range = $tag
            $compareTextZh = "首次发布内容"
            $compareTextEn = "Initial release contents"
          }

          @(
            '<p align="right">',
            '  <a href="#中文"><kbd>中文</kbd></a>',
            '  <a href="#english"><kbd>English</kbd></a>',
            '</p>',
            '',
            '<a id="中文"></a>',
            '',
            "# GKGuard $tag",
            "",
            "## 中文",
            "",
            "## 概要",
            "",
            "- $compareTextZh。",
            "- 已完成后端测试、桌面后端打包和 Windows/macOS/Linux 桌面端构建。",
            "- Windows 安装包、macOS dmg/zip、Linux AppImage/deb 和 Electron 更新元数据已附在本次 GitHub Release 下方。",
            "",
            "## 使用说明",
            "",
            "- Windows 下载 `GKGuard-Setup-*.exe` 安装桌面版。",
            "- macOS 下载 `GKGuard-macOS-*.dmg` 或 `GKGuard-macOS-*.zip` 试用桌面版；当前未配置 Apple 签名与公证。",
            "- Linux 下载 `GKGuard-Linux-*.AppImage` 或 `GKGuard-Linux-*.deb` 试用桌面版。",
            "- 安装后直接打开即可启动内置本地 GKGuard C2 后端并进入 `/demo`。",
            "- 软件本体和本地模拟回退不依赖校园网；真实 CampusVision C1 检索需要校园网、VPN 或 SSH 隧道访问 CampusVision C1 服务所在服务器。",
            "- `latest*.yml` 和 `.blockmap` 用于 Electron 更新机制，通常不需要手动打开。",
            "",
            "## 提交",
            ""
          ) | Set-Content release-notes.md -Encoding UTF8

          $commits = git log --pretty=format:"- %s (%h)" $range
          if ($commits) {
            $commits | Add-Content release-notes.md -Encoding UTF8
          } else {
            "- 未找到该标签范围内的提交记录。" | Add-Content release-notes.md -Encoding UTF8
          }

          @(
            "",
            "## 文件变更",
            ""
          ) | Add-Content release-notes.md -Encoding UTF8

          $files = git diff --name-status $range
          if ($files) {
            $files | ForEach-Object {
              $parts = $_ -split "`t"
              $status = switch ($parts[0]) {
                "A" { "新增" }
                "M" { "修改" }
                "D" { "删除" }
                "R" { "重命名" }
                default { $parts[0] }
              }
              "- ${status}: ``$($parts[-1])``"
            } | Add-Content release-notes.md -Encoding UTF8
          } else {
            "- 未找到该标签范围内的文件变更。" | Add-Content release-notes.md -Encoding UTF8
          }

          @(
            "",
            '<p align="right"><a href="#中文">返回中文顶部</a></p>',
            "",
            "---",
            "",
            '<a id="english"></a>',
            "",
            "# GKGuard $tag",
            "",
            "## English",
            "",
            "## Summary",
            "",
            "- $compareTextEn.",
            "- Backend tests, desktop backend bundling, and Windows/macOS/Linux desktop builds were completed.",
            "- The Windows installer, macOS dmg/zip, Linux AppImage/deb, and Electron update metadata are attached below this Release.",
            "",
            "## Usage",
            "",
            "- On Windows, download `GKGuard-Setup-*.exe` to install the desktop app.",
            "- On macOS, download `GKGuard-macOS-*.dmg` or `GKGuard-macOS-*.zip` to try the desktop app; Apple signing and notarization are not configured yet.",
            "- On Linux, download `GKGuard-Linux-*.AppImage` or `GKGuard-Linux-*.deb` to try the desktop app.",
            "- After installation, opening the app starts the bundled local GKGuard C2 backend and loads `/demo`.",
            "- The app itself and mock fallback do not require campus network access; real CampusVision C1 search requires campus network, VPN, or an SSH tunnel to the CampusVision C1 service host.",
            "- `latest*.yml` and `.blockmap` are for the Electron update flow and usually do not need to be opened manually.",
            "",
            '<p align="right"><a href="#english">Back to English top</a></p>'
          ) | Add-Content release-notes.md -Encoding UTF8

      - name: Publish GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          mapfile -d '' release_files < <(find release-assets -type f -print0)
          if [ "${#release_files[@]}" -eq 0 ]; then
            echo "No release artifacts found under release-assets." >&2
            exit 1
          fi

          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release edit "$TAG_NAME" --title "GKGuard $TAG_NAME" --notes-file release-notes.md
            gh release upload "$TAG_NAME" "${release_files[@]}" --clobber
          else
            gh release create "$TAG_NAME" "${release_files[@]}" --title "GKGuard $TAG_NAME" --notes-file release-notes.md
          fi
