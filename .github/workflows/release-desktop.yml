name: Build Desktop Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows Desktop App
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install backend dependencies
        run: python -m pip install -r backend/requirements.txt

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install desktop dependencies
        run: npm ci

      - name: Run backend tests
        run: npm run test:backend

      - name: Build bundled backend
        run: pyinstaller --noconfirm --onedir --name gkguard-backend --distpath backend-dist --workpath backend-build --paths backend --add-data "backend/app/static;app/static" --add-data "backend/data;data" backend/desktop_server.py

      - name: Build Windows installer
        run: npm run dist

      - name: Generate release notes
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          $tag = $env:GITHUB_REF_NAME
          $curatedNotes = "docs/releases/$tag.md"
          if (Test-Path $curatedNotes) {
            Copy-Item $curatedNotes release-notes.md
            exit 0
          }

          $previousTag = git tag --sort=-version:refname | Where-Object { $_ -ne $tag } | Select-Object -First 1
          if ($previousTag) {
            $range = "$previousTag..$tag"
            $compareTextZh = "相较 $previousTag 的变更"
            $compareTextEn = "Changes since $previousTag"
          } else {
            $range = $tag
            $compareTextZh = "首次发布内容"
            $compareTextEn = "Initial release contents"
          }

          @(
            '<p align="right">',
            '  <a href="#中文"><kbd>中文</kbd></a>',
            '  <a href="#english"><kbd>English</kbd></a>',
            '</p>',
            '',
            '<a id="中文"></a>',
            '',
            "# GKGuard $tag",
            "",
            "## 中文",
            "",
            "## 概要",
            "",
            "- $compareTextZh。",
            "- 已完成后端测试、桌面后端打包和 Windows 安装包构建。",
            "- Windows 安装包、blockmap 和 latest.yml 更新元数据已附在本 Release 下方。",
            "",
            "## 使用说明",
            "",
            "- 下载 `GKGuard-Setup-*.exe` 安装桌面版。",
            "- 安装后直接打开即可启动内置本地 GKGuard C2 后端并进入 `/demo`。",
            "- 软件本体和 mock fallback 不依赖校园网；真实 CampusVision C1 检索需要校园网、VPN 或 SSH 隧道访问 CampusVision C1 服务器。",
            "- `.blockmap` 和 `latest.yml` 用于 Electron 更新机制，通常不需要手动打开。",
            "",
            "## 提交",
            ""
          ) | Set-Content release-notes.md -Encoding UTF8

          $commits = git log --pretty=format:"- %s (%h)" $range
          if ($commits) {
            $commits | Add-Content release-notes.md -Encoding UTF8
          } else {
            "- 未找到该标签范围内的提交记录。" | Add-Content release-notes.md -Encoding UTF8
          }

          @(
            "",
            "## 文件变更",
            ""
          ) | Add-Content release-notes.md -Encoding UTF8

          $files = git diff --name-status $range
          if ($files) {
            $files | ForEach-Object {
              $parts = $_ -split "`t"
              $status = switch ($parts[0]) {
                "A" { "新增" }
                "M" { "修改" }
                "D" { "删除" }
                "R" { "重命名" }
                default { $parts[0] }
              }
              "- ${status}: ``$($parts[-1])``"
            } | Add-Content release-notes.md -Encoding UTF8
          } else {
            "- 未找到该标签范围内的文件变更。" | Add-Content release-notes.md -Encoding UTF8
          }

          @(
            "",
            '<p align="right"><a href="#中文">返回中文顶部</a></p>',
            "",
            "---",
            "",
            '<a id="english"></a>',
            "",
            "# GKGuard $tag",
            "",
            "## English",
            "",
            "## Summary",
            "",
            "- $compareTextEn.",
            "- Backend tests, desktop backend bundling, and Windows installer build were completed.",
            "- The Windows installer, blockmap, and latest.yml update metadata are attached below this Release.",
            "",
            "## Usage",
            "",
            "- Download `GKGuard-Setup-*.exe` to install the desktop app.",
            "- After installation, opening the app starts the bundled local GKGuard C2 backend and loads `/demo`.",
            "- The app itself and mock fallback do not require campus network access; real CampusVision C1 search requires campus network, VPN, or an SSH tunnel to the CampusVision C1 server.",
            "- `.blockmap` and `latest.yml` are for the Electron update flow and usually do not need to be opened manually.",
            "",
            '<p align="right"><a href="#english">Back to English top</a></p>'
          ) | Add-Content release-notes.md -Encoding UTF8

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: GKGuard-Windows
          path: |
            release/*.exe
            release/*.blockmap
            release/latest*.yml
          if-no-files-found: error

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: GKGuard ${{ github.ref_name }}
          body_path: release-notes.md
          files: |
            release/*.exe
            release/*.blockmap
            release/latest*.yml