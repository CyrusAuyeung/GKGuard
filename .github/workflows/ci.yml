name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: Verify
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install backend dependencies
        run: python -m pip install -r backend/requirements.txt

      - name: Run backend tests
        run: python -m pytest backend

      - name: Compile desktop backend entrypoint
        run: python -m py_compile backend/desktop_server.py

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm

      - name: Install desktop dependencies
        run: npm ci

      - name: Check Electron main process syntax
        run: node --check desktop/main.js

      - name: Check Electron preload syntax
        run: node --check desktop/preload.js

      - name: Audit desktop dependencies
        run: npm audit --audit-level=low
