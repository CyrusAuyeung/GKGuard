<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>GKGuard 正在启动</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f4f7fb;
        --surface: #ffffff;
        --primary: #1769f5;
        --ink: #202938;
        --muted: #7a8798;
        --line: #dfe7f2;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        color: var(--ink);
        background: var(--bg);
        font-family: "Segoe UI", "Microsoft YaHei", Arial, sans-serif;
      }

      .boot-card {
        width: min(420px, calc(100vw - 32px));
        padding: 30px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface);
        box-shadow: 0 20px 50px rgba(31, 50, 88, 0.12);
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .brand-mark {
        display: grid;
        place-items: center;
        width: 38px;
        height: 38px;
        border-radius: 8px;
        background: #eef5ff;
        box-shadow: inset 0 0 0 1px rgba(23, 105, 245, 0.16);
      }

      .brand-mark img {
        width: 28px;
        height: 28px;
        object-fit: contain;
      }

      h1 {
        margin: 0;
        font-size: 24px;
        letter-spacing: 0;
      }

      p {
        margin: 14px 0 0;
        color: var(--muted);
        line-height: 1.7;
      }

      .progress {
        height: 6px;
        margin-top: 24px;
        overflow: hidden;
        border-radius: 999px;
        background: #dce7f6;
      }

      .progress i {
        display: block;
        width: 44%;
        height: 100%;
        border-radius: inherit;
        background: var(--primary);
        animation: loading 1.2s ease-in-out infinite alternate;
      }

      @keyframes loading {
        from { transform: translateX(-28%); }
        to { transform: translateX(156%); }
      }
    </style>
  </head>
  <body>
    <main class="boot-card">
      <div class="brand">
        <div class="brand-mark"><img src="assets/icons/boot-mark.png" alt="" /></div>
        <h1>GKGuard</h1>
      </div>
      <p>正在启动本地 AI 检索服务，并加载轨迹分析控制台。</p>
      <div class="progress" aria-label="启动进度"><i></i></div>
    </main>
  </body>
</html>
