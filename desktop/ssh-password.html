<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>连接 CampusVision C1 服务</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f4f7fb;
        --panel: #ffffff;
        --panel-soft: #f8fbff;
        --line: #dfe6f1;
        --line-strong: #cdd8e8;
        --text: #142033;
        --muted: #66758a;
        --primary: #246ff5;
        --primary-dark: #1858d6;
        --green: #20bf75;
        --red: #f04d62;
        --shadow: 0 18px 42px rgba(30, 50, 82, 0.13);
        font-family: "Microsoft YaHei", "Segoe UI", Arial, sans-serif;
      }
      * { box-sizing: border-box; }
      html,
      body { width: 100%; height: 100%; overflow: hidden; }
      body {
        margin: 0;
        display: grid;
        place-items: center;
        padding: 12px 16px;
        color: var(--text);
        background: radial-gradient(circle at 18% 8%, rgba(36, 111, 245, 0.09), transparent 30%), linear-gradient(180deg, #f9fbff 0%, var(--bg) 100%);
        letter-spacing: 0;
      }
      button,
      input { font: inherit; }
      button:focus-visible,
      input:focus-visible { outline: 3px solid rgba(36, 111, 245, 0.22); outline-offset: 2px; }
      .connection-card {
        width: min(512px, calc(100vw - 32px));
        display: grid;
        gap: 11px;
        padding: 18px;
        border: 1px solid var(--line);
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.96);
        box-shadow: var(--shadow);
      }
      header {
        display: grid;
        grid-template-columns: 40px minmax(0, 1fr);
        align-items: center;
        gap: 10px;
      }
      .connection-icon {
        width: 40px;
        height: 40px;
        color: var(--primary);
        fill: none;
        stroke: currentColor;
        stroke-width: 1.8;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .eyebrow {
        margin: 0 0 3px;
        color: #5c75a0;
        font-size: 12px;
        font-weight: 800;
      }
      h1 { margin: 0; font-size: 20px; line-height: 1.2; }
      p { margin: 0; }
      .reason {
        padding: 9px 11px;
        border: 1px solid #d8e4f5;
        border-radius: 8px;
        color: #31527f;
        background: #f3f8ff;
        line-height: 1.35;
        font-size: 13px;
      }
      .endpoint-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }
      .endpoint-item {
        min-width: 0;
        display: grid;
        gap: 4px;
        padding: 9px 10px;
        border: 1px solid #edf2f8;
        border-radius: 8px;
        background: var(--panel-soft);
      }
      .endpoint-item dt { color: #6b7e98; font-size: 12px; font-weight: 700; }
      .endpoint-item dd {
        margin: 0;
        overflow: hidden;
        color: #263850;
        font-size: 13px;
        font-weight: 800;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .status-panel {
        display: grid;
        gap: 8px;
        padding: 10px;
        border: 1px solid #edf2f8;
        border-radius: 8px;
        background: #fff;
      }
      .status-panel.is-busy { border-color: #aecaef; background: #f7fbff; }
      .status-panel.is-done { border-color: #9bdcbc; background: #f5fbf8; }
      .status-panel.is-failed { border-color: #f5a2ad; background: #fff6f7; }
      .progress-heading {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        font-size: 12px;
        font-weight: 800;
        color: #4f647f;
      }
      .progress-track {
        overflow: hidden;
        height: 7px;
        border-radius: 999px;
        background: #dce7f6;
      }
      .progress-bar {
        display: block;
        width: 0%;
        height: 100%;
        border-radius: inherit;
        background: var(--primary);
        transition: width .18s ease, background .18s ease;
      }
      .status-panel.is-done .progress-bar { background: var(--green); }
      .status-panel.is-failed .progress-bar { background: var(--red); }
      .status {
        min-height: 18px;
        color: #47617f;
        font-size: 12px;
        line-height: 1.35;
      }
      .status.is-done { color: #16845a; }
      .status.is-failed { color: #bf334b; }
      .connection-steps {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 5px;
        margin: 0;
        padding: 0;
        list-style: none;
      }
      .connection-steps li {
        display: grid;
        gap: 4px;
        justify-items: center;
        color: #8a99ad;
        font-size: 11px;
        font-weight: 800;
        text-align: center;
      }
      .connection-steps li::before {
        content: "";
        width: 9px;
        height: 9px;
        border-radius: 50%;
        background: #c9d6e8;
      }
      .connection-steps li.is-active { color: var(--primary); }
      .connection-steps li.is-active::before { background: var(--primary); box-shadow: 0 0 0 4px rgba(36, 111, 245, .12); }
      .connection-steps li.is-done { color: #16845a; }
      .connection-steps li.is-done::before { background: var(--green); }
      .connection-steps li.is-failed { color: #bf334b; }
      .connection-steps li.is-failed::before { background: var(--red); }
      form { display: grid; gap: 9px; }
      label {
        display: grid;
        gap: 6px;
        color: var(--text);
        font-size: 13px;
        font-weight: 800;
      }
      input {
        width: 100%;
        height: 40px;
        border: 1px solid var(--line-strong);
        border-radius: 8px;
        padding: 0 13px;
        color: #24334a;
        background: #fff;
        box-shadow: inset 0 1px 2px rgba(31, 49, 78, 0.04);
        font-size: 15px;
      }
      input:disabled { color: #7a8798; background: #f5f8fc; }
      .password-hint {
        margin-top: -4px;
        color: #687792;
        font-size: 12px;
        line-height: 1.32;
      }
      .actions {
        display: flex;
        justify-content: flex-end;
        gap: 8px;
      }
      button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 36px;
        border-radius: 7px;
        border: 1px solid #d7e3f4;
        padding: 0 14px;
        color: #2e5fbd;
        background: #fff;
        font-weight: 800;
        cursor: pointer;
      }
      button:hover { border-color: #8cb7ff; background: #f5f9ff; }
      button.primary {
        border-color: var(--primary);
        color: #fff;
        background: var(--primary);
        box-shadow: 0 9px 18px rgba(36, 111, 245, 0.22);
      }
      button.primary:hover { background: var(--primary-dark); }
      button:disabled { cursor: default; opacity: .66; }
      .help-panel {
        display: grid;
        gap: 5px;
        padding: 9px 10px;
        border: 1px solid #edf2f8;
        border-radius: 8px;
        background: #fbfdff;
        color: #65758c;
        font-size: 12px;
        line-height: 1.35;
      }
      .help-panel strong { color: #33445d; }
      @media (max-width: 520px) {
        body { padding: 12px; }
        .connection-card { width: calc(100vw - 24px); padding: 18px; }
        .endpoint-grid { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <main class="connection-card">
      <header>
        <svg class="connection-icon" viewBox="0 0 24 24" aria-hidden="true">
          <rect x="4" y="5" width="7" height="5" rx="1.5"></rect>
          <rect x="4" y="14" width="7" height="5" rx="1.5"></rect>
          <path d="M13 7.5h2.5a3.5 3.5 0 0 1 3.5 3.5v1"></path>
          <path d="M13 16.5h2.5a3.5 3.5 0 0 0 3.5-3.5v-1"></path>
          <path d="M18.8 11.5 21 13.7l2.2-2.2" transform="translate(-2)"></path>
        </svg>
        <div>
          <p class="eyebrow">GKGuard C2 本地代理</p>
          <h1>连接 CampusVision C1 服务</h1>
        </div>
      </header>

      <p id="reason" class="reason">请输入服务器密码以建立内嵌 SSH 隧道。</p>

      <dl class="endpoint-grid" aria-label="连接信息">
        <div class="endpoint-item"><dt>服务器账号</dt><dd id="account"></dd></div>
        <div class="endpoint-item"><dt>本地隧道</dt><dd id="tunnel"></dd></div>
      </dl>

      <section id="statusPanel" class="status-panel" aria-label="连接进度">
        <div class="progress-heading">
          <span>连接进度</span>
          <strong id="progressPercent">0%</strong>
        </div>
        <span class="progress-track"><span id="progressBar" class="progress-bar"></span></span>
        <p id="connectStatus" class="status" role="status" aria-live="polite">等待输入服务器密码</p>
        <ol id="connectionSteps" class="connection-steps" aria-label="连接步骤">
          <li data-step="password" class="is-active">输入密码</li>
          <li data-step="ssh">建立 SSH</li>
          <li data-step="tunnel">打开隧道</li>
          <li data-step="verify">验证服务</li>
        </ol>
      </section>

      <form id="passwordForm">
        <label>
          <span>服务器密码</span>
          <input id="password" type="password" autocomplete="current-password" autofocus />
        </label>
        <p class="password-hint">密码只用于本次 SSH 连接，不会保存到 GKGuard、配置文件、日志或仓库。</p>
        <footer class="actions">
          <button id="cancelBtn" type="button">取消</button>
          <button id="submitBtn" class="primary" type="submit">连接 CampusVision C1</button>
        </footer>
      </form>

      <section class="help-panel" aria-label="连接失败排查">
        <strong>连接失败时请检查：</strong>
        <span>服务器密码、校园网/VPN、CampusVision C1 服务状态，以及本机 18000 端口是否被占用。</span>
      </section>
    </main>

    <script>
      const params = new URLSearchParams(window.location.search);
      const reason = document.querySelector("#reason");
      const account = document.querySelector("#account");
      const tunnel = document.querySelector("#tunnel");
      const statusPanel = document.querySelector("#statusPanel");
      const progressBar = document.querySelector("#progressBar");
      const progressPercent = document.querySelector("#progressPercent");
      const connectStatus = document.querySelector("#connectStatus");
      const passwordInput = document.querySelector("#password");
      const submitBtn = document.querySelector("#submitBtn");
      const cancelBtn = document.querySelector("#cancelBtn");
      const steps = Array.from(document.querySelectorAll("#connectionSteps li"));
      const stepThresholds = { password: 0, ssh: 12, tunnel: 38, verify: 72 };

      reason.textContent = params.get("reason") || "请输入服务器密码以建立内嵌 SSH 隧道。";
      account.textContent = `${params.get("user") || ""}@${params.get("host") || ""}`;
      tunnel.textContent = `${params.get("localPort") || "18000"} -> ${params.get("remoteHost") || "127.0.0.1"}:${params.get("remotePort") || "8000"}`;

      function setBusy(isBusy) {
        passwordInput.disabled = isBusy;
        submitBtn.disabled = isBusy;
        cancelBtn.disabled = isBusy;
        submitBtn.textContent = isBusy ? "连接中..." : "连接 CampusVision C1";
      }

      function setSteps(percent, state) {
        let activeStep = "password";
        Object.entries(stepThresholds).forEach(([step, threshold]) => {
          if (percent >= threshold) activeStep = step;
        });

        steps.forEach((step) => {
          const key = step.dataset.step;
          const threshold = stepThresholds[key] || 0;
          step.classList.toggle("is-done", state === "done" || ((state === "busy" || state === "failed") && percent > threshold && key !== activeStep));
          step.classList.toggle("is-active", state !== "done" && state !== "failed" && key === activeStep);
          step.classList.toggle("is-failed", state === "failed" && key === activeStep);
        });
      }

      function setProgress(event = {}) {
        const percent = Math.max(0, Math.min(100, Number(event.percent || 0)));
        const state = event.failed ? "failed" : event.done ? "done" : event.busy ? "busy" : "idle";
        progressBar.style.width = `${percent}%`;
        progressPercent.textContent = `${percent}%`;
        connectStatus.textContent = event.message || "等待输入服务器密码";
        connectStatus.classList.toggle("is-done", state === "done");
        connectStatus.classList.toggle("is-failed", state === "failed");
        statusPanel.classList.toggle("is-busy", state === "busy");
        statusPanel.classList.toggle("is-done", state === "done");
        statusPanel.classList.toggle("is-failed", state === "failed");
        setSteps(percent, state);

        if (state === "busy") {
          setBusy(true);
        } else if (state === "failed" && event.recoverable) {
          passwordInput.disabled = false;
          submitBtn.disabled = false;
          cancelBtn.disabled = false;
          submitBtn.textContent = "重新连接";
          passwordInput.focus();
        }
      }

      window.gkguardDesktop?.onSshConnectProgress?.((event) => setProgress(event));

      document.querySelector("#passwordForm").addEventListener("submit", (event) => {
        event.preventDefault();
        if (!passwordInput.value) {
          setProgress({ percent: 0, message: "请输入服务器密码。", failed: true, recoverable: true });
          return;
        }
        setProgress({ percent: 8, message: "正在准备连接...", busy: true });
        if (!window.gkguardDesktop?.submitSshPassword) {
          setProgress({ percent: 100, message: "当前预览环境无法建立 SSH 连接。", failed: true, recoverable: true });
          return;
        }
        window.gkguardDesktop.submitSshPassword(passwordInput.value);
        passwordInput.value = "";
      });

      cancelBtn.addEventListener("click", () => window.gkguardDesktop?.cancelSshPassword?.());
      setProgress({ percent: 0, message: "等待输入服务器密码" });
    </script>
  </body>
</html>
