<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>连接 C1 服务器</title>
    <style>
      :root { color-scheme: light; font-family: "Microsoft YaHei", "Segoe UI", sans-serif; }
      body { margin: 0; min-height: 100vh; background: #f4f7fb; color: #12213a; display: grid; place-items: center; }
      main { width: min(380px, calc(100vw - 40px)); }
      h1 { margin: 0 0 8px; font-size: 22px; line-height: 1.3; }
      p { margin: 0 0 18px; color: #687792; line-height: 1.55; font-size: 13px; }
      dl { margin: 0 0 18px; display: grid; gap: 8px; }
      div { display: flex; justify-content: space-between; gap: 12px; border: 1px solid #e6ecf5; border-radius: 8px; padding: 8px 10px; background: white; }
      dt { color: #7d8ca5; font-size: 12px; }
      dd { margin: 0; font-weight: 700; font-size: 12px; color: #263850; }
      label { display: grid; gap: 8px; margin: 0 0 18px; font-size: 13px; font-weight: 700; }
      input { box-sizing: border-box; width: 100%; height: 42px; border: 1px solid #c9d5e7; border-radius: 8px; padding: 0 12px; font-size: 15px; }
      input:focus { outline: 2px solid rgba(36, 111, 245, .25); border-color: #246ff5; }
      footer { display: flex; justify-content: flex-end; gap: 10px; }
      button { height: 38px; border-radius: 8px; border: 1px solid #c9d5e7; background: white; color: #246ff5; font-weight: 700; padding: 0 14px; cursor: pointer; }
      button.primary { border-color: #246ff5; background: #246ff5; color: white; }
      small { display: block; margin-top: 12px; color: #8c98ac; line-height: 1.4; }
    </style>
  </head>
  <body>
    <main>
      <h1>连接 C1 服务器</h1>
      <p id="reason">请输入服务器密码以建立内嵌 SSH 隧道。</p>
      <dl>
        <div><dt>账号</dt><dd id="account"></dd></div>
        <div><dt>隧道</dt><dd id="tunnel"></dd></div>
      </dl>
      <form id="passwordForm">
        <label>
          服务器密码
          <input id="password" type="password" autocomplete="current-password" autofocus />
        </label>
        <footer>
          <button id="cancelBtn" type="button">取消</button>
          <button class="primary" type="submit">连接 C1</button>
        </footer>
      </form>
      <small>密码只用于本次 SSH 连接，不会保存到 GKGuard 或仓库。</small>
    </main>
    <script>
      const params = new URLSearchParams(window.location.search);
      document.querySelector("#reason").textContent = `${params.get("reason") || "请输入服务器密码以建立内嵌 SSH 隧道。"}`;
      document.querySelector("#account").textContent = `${params.get("user") || ""}@${params.get("host") || ""}`;
      document.querySelector("#tunnel").textContent = `${params.get("localPort") || "18000"} -> ${params.get("remoteHost") || "127.0.0.1"}:${params.get("remotePort") || "8000"}`;
      document.querySelector("#passwordForm").addEventListener("submit", (event) => {
        event.preventDefault();
        window.gkguardDesktop.submitSshPassword(document.querySelector("#password").value);
        document.querySelector("#password").value = "";
      });
      document.querySelector("#cancelBtn").addEventListener("click", () => window.gkguardDesktop.cancelSshPassword());
    </script>
  </body>
</html>
