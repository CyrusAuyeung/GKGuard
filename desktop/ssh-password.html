<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>连接 CampusVision C1 服务</title>
    <style>
      :root { color-scheme: light; font-family: "Microsoft YaHei", "Segoe UI", sans-serif; }
      html, body { width: 100%; height: 100%; overflow: hidden; }
      body { margin: 0; background: #f4f7fb; color: #12213a; display: grid; place-items: center; }
      main { width: min(430px, calc(100vw - 40px)); }
      header { display: flex; align-items: center; gap: 10px; margin: 0 0 7px; }
      .connection-icon { width: 32px; height: 32px; flex: 0 0 auto; color: #246ff5; fill: none; stroke: currentColor; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
      h1 { margin: 0 0 7px; font-size: 22px; line-height: 1.25; }
      header h1 { margin: 0; }
      p { margin: 0 0 14px; color: #687792; line-height: 1.45; font-size: 13px; }
      dl { margin: 0 0 14px; display: grid; gap: 8px; }
      div { display: flex; justify-content: space-between; gap: 12px; border: 1px solid #e6ecf5; border-radius: 8px; padding: 8px 10px; background: white; }
      dt { color: #7d8ca5; font-size: 12px; }
      dd { margin: 0; font-weight: 700; font-size: 12px; color: #263850; }
      label { display: grid; gap: 8px; margin: 0 0 14px; font-size: 13px; font-weight: 700; }
      input { box-sizing: border-box; width: 100%; height: 42px; border: 1px solid #c9d5e7; border-radius: 8px; padding: 0 12px; font-size: 15px; }
      input:focus { outline: 2px solid rgba(36, 111, 245, .25); border-color: #246ff5; }
      footer { display: flex; justify-content: flex-end; gap: 10px; }
      button { height: 38px; border-radius: 8px; border: 1px solid #c9d5e7; background: white; color: #246ff5; font-weight: 700; padding: 0 14px; cursor: pointer; }
      button.primary { border-color: #246ff5; background: #246ff5; color: white; }
      button:disabled { cursor: default; opacity: .58; }
      small { display: block; margin-top: 10px; color: #8c98ac; line-height: 1.35; }
      .progress-wrap { display: grid; gap: 7px; margin: 2px 0 14px; padding: 0; border: 0; background: transparent; }
      .progress-track { overflow: hidden; height: 7px; border-radius: 999px; background: #dce7f6; }
      .progress-bar { display: block; width: 0%; height: 100%; border-radius: inherit; background: #246ff5; transition: width .18s ease; }
      .status { margin: 0; color: #47617f; font-size: 12px; }
      .status.is-done { color: #16845a; }
      .status.is-failed { color: #bf334b; }
    </style>
  </head>
  <body>
    <main>
      <header>
        <svg class="connection-icon" viewBox="0 0 24 24" aria-hidden="true">
          <rect x="4" y="5" width="7" height="5" rx="1.5"></rect>
          <rect x="4" y="14" width="7" height="5" rx="1.5"></rect>
          <path d="M13 7.5h2.5a3.5 3.5 0 0 1 3.5 3.5v1"></path>
          <path d="M13 16.5h2.5a3.5 3.5 0 0 0 3.5-3.5v-1"></path>
          <path d="M18.8 11.5 21 13.7l2.2-2.2" transform="translate(-2)"></path>
        </svg>
        <h1>连接 CampusVision C1 服务</h1>
      </header>
      <p id="reason">请输入服务器密码以建立内嵌 SSH 隧道。</p>
      <dl>
        <div><dt>账号</dt><dd id="account"></dd></div>
        <div><dt>隧道</dt><dd id="tunnel"></dd></div>
      </dl>
      <form id="passwordForm">
        <label>
          服务器密码
          <input id="password" type="password" autocomplete="current-password" autofocus />
        </label>
        <section class="progress-wrap" aria-live="polite">
          <span class="progress-track"><span id="progressBar" class="progress-bar"></span></span>
          <p id="connectStatus" class="status">等待输入服务器密码</p>
        </section>
        <footer>
          <button id="cancelBtn" type="button">取消</button>
          <button id="submitBtn" class="primary" type="submit">连接 CampusVision C1</button>
        </footer>
      </form>
      <small>密码只用于本次 SSH 连接，不会保存到 GKGuard 或仓库。</small>
    </main>
    <script>
      const params = new URLSearchParams(window.location.search);
      document.querySelector("#reason").textContent = `${params.get("reason") || "请输入服务器密码以建立内嵌 SSH 隧道。"}`;
      document.querySelector("#account").textContent = `${params.get("user") || ""}@${params.get("host") || ""}`;
      document.querySelector("#tunnel").textContent = `${params.get("localPort") || "18000"} -> ${params.get("remoteHost") || "127.0.0.1"}:${params.get("remotePort") || "8000"}`;
      const progressBar = document.querySelector("#progressBar");
      const connectStatus = document.querySelector("#connectStatus");
      const passwordInput = document.querySelector("#password");
      const submitBtn = document.querySelector("#submitBtn");
      const cancelBtn = document.querySelector("#cancelBtn");
      window.gkguardDesktop?.onSshConnectProgress?.((event) => {
        const percent = Math.max(0, Math.min(100, Number(event?.percent || 0)));
        progressBar.style.width = `${percent}%`;
        connectStatus.textContent = event?.message || "正在连接...";
        connectStatus.classList.toggle("is-done", Boolean(event?.done));
        connectStatus.classList.toggle("is-failed", Boolean(event?.failed));
        if (event?.busy) {
          passwordInput.disabled = true;
          submitBtn.disabled = true;
          cancelBtn.disabled = true;
        }
      });
      document.querySelector("#passwordForm").addEventListener("submit", (event) => {
        event.preventDefault();
        if (!passwordInput.value) {
          connectStatus.textContent = "请输入服务器密码";
          connectStatus.classList.add("is-failed");
          return;
        }
        connectStatus.classList.remove("is-failed", "is-done");
        progressBar.style.width = "8%";
        connectStatus.textContent = "正在准备连接...";
        submitBtn.disabled = true;
        cancelBtn.disabled = true;
        passwordInput.disabled = true;
        window.gkguardDesktop?.submitSshPassword?.(passwordInput.value);
        passwordInput.value = "";
      });
      document.querySelector("#cancelBtn").addEventListener("click", () => window.gkguardDesktop?.cancelSshPassword?.());
    </script>
  </body>
</html>
